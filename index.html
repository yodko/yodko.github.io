<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YODKO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo {
    font-family: "Rubik Mono One", sans-serif;
    font-size: 10rem;
    color: #fff;
    line-height: 1;
    display: flex;
  }
  .logo .l-y { margin-right: -0.04em; }
  .logo .l-o1 { margin-right:  0.02em; }
  .logo .l-d { margin-right: -0.01em; }
  .logo .l-k { margin-right: -0.04em; }
  .logo .l-o2 { margin-right: 0; }

  .subtitle {
    font-family: "Courier New", monospace;
    font-size: 1.2rem;
    color: #fff;
    display: flex;
    justify-content: space-between;
    padding: 0 2em;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
  <main>
    <div class="logo" aria-label="YODKO">
      <span class="l-y">Y</span><span class="l-o1">O</span><span class="l-d">D</span><span class="l-k">K</span><span class="l-o2">O</span>
    </div>
    <div class="subtitle" aria-label="COMPUTER ENTERTAINMENT">
      <span>C</span><span>O</span><span>M</span><span>P</span><span>U</span><span>T</span><span>E</span><span>R</span><span>E</span><span>N</span><span>T</span><span>E</span><span>R</span><span>T</span><span>A</span><span>I</span><span>N</span><span>M</span><span>E</span><span>N</span><span>T</span>
    </div>
  </main>
</body>
