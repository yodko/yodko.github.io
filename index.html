<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YODKO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo {
    font-family: "Rubik Mono One", sans-serif;
    font-size: 10rem;
    color: #fff;
    line-height: 1;
    display: flex;
  }
  /* Per-letter kerning. Negative margins pull letters closer; Y and K
     need extra pulling because their shapes leave visual air at the
     top / top-right. Tweak by 0.01em increments when retuning. */
  .logo .l-y  { margin-right: -0.13em; }
  .logo .l-o1 { margin-right: -0.05em; }
  .logo .l-d  { margin-right: -0.07em; }
  .logo .l-k  { margin-right: -0.10em; }
  .logo .l-o2 { margin-right: 0; }

  .subtitle {
    font-family: "Courier New", monospace;
    font-size: 1.45rem;
    color: #fff;
    letter-spacing: 0.45em;
    text-align: center;
    margin-top: 0.75rem;
  }
</style>
</head>
<body>
  <main>
    <div class="logo" aria-label="YODKO">
      <span class="l-y">Y</span><span class="l-o1">O</span><span class="l-d">D</span><span class="l-k">K</span><span class="l-o2">O</span>
    </div>
    <div class="subtitle">COMPUTER ENTERTAINMENT</div>
  </main>
</body>
</html>
